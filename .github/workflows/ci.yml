name: CI - Parcial Moviles II

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restaurar dependencias
        run: dotnet restore Parcial-Moviles.slnx

      - name: Compilar en Release
        run: dotnet build Parcial-Moviles.slnx -c Release

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restaurar dependencias
        run: dotnet restore Parcial-Moviles.slnx

      - name: Ejecutar tests
        run: dotnet test Parcial-Moviles.slnx --no-build --verbosity normal

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: '**/bin/Release/**'